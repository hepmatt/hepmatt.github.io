<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Custom Crossword</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a18;
  --paper: #f7f4ee;
  --paper2: #edeae2;
  --rule: #c8c4b8;
  --hl: #cfe3f5;
  --hl-active: #8bbfdf;
  --correct: #c8e6c9;
  --wrong: #ffcdd2;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--paper); color: var(--ink); font-family: 'Source Serif 4', Georgia, serif; min-height: 100vh; }

.masthead {
  border-bottom: 3px double var(--ink);
  padding: 14px 16px 10px;
  text-align: center;
  background: var(--paper);
}
.masthead-eyebrow { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: #888; margin-bottom: 4px; }
.masthead-logo { font-family: 'UnifrakturMaguntia', cursive; font-size: clamp(28px, 7vw, 48px); line-height: 1; color: var(--ink); }
.masthead-sub { font-size: 11px; color: #999; margin-top: 4px; font-style: italic; }

.wrap { max-width: 780px; margin: 0 auto; padding: 12px 12px 40px; }

.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--rule); margin-bottom: 10px;
}
.dir-toggle { display: flex; border: 1.5px solid var(--ink); border-radius: 3px; overflow: hidden; }
.dir-btn {
  padding: 5px 16px; font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  font-family: 'Source Serif 4', serif; border: none; background: transparent;
  cursor: pointer; color: #777; transition: all .12s;
}
.dir-btn.on { background: var(--ink); color: var(--paper); }
.acts { display: flex; gap: 6px; }
.act {
  padding: 5px 13px; font-size: 11px; letter-spacing: .07em; text-transform: uppercase;
  font-family: 'Source Serif 4', serif; border: 1px solid var(--rule);
  background: transparent; cursor: pointer; color: #777; border-radius: 2px;
}
.act:hover { border-color: var(--ink); color: var(--ink); }

.grid-wrap { overflow-x: auto; margin-bottom: 10px; }
table.cw { border-collapse: collapse; margin: 0 auto; border: 2px solid var(--ink); }
table.cw td {
  width: clamp(22px, 5vw, 32px); height: clamp(22px, 5vw, 32px);
  border: 1px solid var(--rule); text-align: center; vertical-align: middle;
  position: relative; background: var(--paper); padding: 0;
}
table.cw td.blk { background: var(--ink); border-color: var(--ink); }
table.cw td .n {
  position: absolute; top: 1px; left: 2px;
  font-size: clamp(6px, 1.4vw, 8px); font-weight: 400; color: #666; line-height: 1;
}
table.cw td input {
  position: absolute; inset: 0; width: 100%; height: 100%;
  border: none; background: transparent; text-align: center;
  font-size: clamp(11px, 3vw, 15px); font-weight: 600;
  font-family: 'Source Serif 4', serif; color: var(--ink);
  text-transform: uppercase; padding: 0; cursor: pointer; caret-color: transparent;
  -webkit-appearance: none; border-radius: 0;
}
table.cw td input:focus { outline: none; }
td.hl { background: var(--hl) !important; }
td.hl-cur { background: var(--hl-active) !important; }
td.ok  { background: var(--correct) !important; }
td.bad { background: var(--wrong) !important; }

.clue-bar {
  font-size: 13px; font-style: italic; padding: 6px 2px;
  color: #444; min-height: 30px; border-bottom: 1px solid var(--rule); margin-bottom: 12px;
}

.clues { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
.col-head {
  font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
  font-weight: 600; border-bottom: 2px solid var(--ink);
  padding-bottom: 4px; margin-bottom: 6px;
}
ul.cl { list-style: none; }
ul.cl li {
  display: flex; gap: 6px; padding: 4px 3px; font-size: 11px; line-height: 1.4;
  border-bottom: 1px solid var(--paper2); cursor: pointer; border-radius: 1px;
}
ul.cl li:hover { background: var(--paper2); }
ul.cl li.active { background: var(--hl); font-weight: 600; }
.cn { min-width: 18px; font-weight: 600; color: #999; font-size: 10px; flex-shrink: 0; padding-top: 1px; }

.result {
  font-size: 13px; text-align: center; padding: 10px;
  border-radius: 2px; margin-top: 12px; display: none;
  font-style: italic; border: 1px solid transparent;
}
.result.ok  { background: var(--correct); border-color: #a5d6a7; color: #1b5e20; }
.result.bad { background: var(--wrong);   border-color: #ef9a9a; color: #b71c1c; }
.dateline { font-size: 10px; text-align: center; color: #bbb; margin-top: 16px; font-style: italic; }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-eyebrow">A Puzzle For Us</div>
  <div class="masthead-logo">Our Crossword</div>
  <div class="masthead-sub">Can you solve it?</div>
</div>

<div class="wrap">
  <div class="toolbar">
    <div class="dir-toggle">
      <button class="dir-btn on" id="bA" onclick="setDir('A')">Across</button>
      <button class="dir-btn"    id="bD" onclick="setDir('D')">Down</button>
    </div>
    <div class="acts">
      <button class="act" onclick="doCheck()">Check</button>
      <button class="act" onclick="doClear()">Clear</button>
      <button class="act" onclick="doReveal()">Reveal</button>
    </div>
  </div>

  <div class="grid-wrap"><table class="cw" id="grid"></table></div>
  <div class="clue-bar" id="cluebar">&nbsp;</div>

  <div class="clues">
    <div><div class="col-head">Across</div><ul class="cl" id="clA"></ul></div>
    <div><div class="col-head">Down</div>  <ul class="cl" id="clD"></ul></div>
  </div>

  <div class="result" id="result"></div>
  <div class="dateline" id="dateline"></div>
</div>

<script>
const WORDS = [
  { word: 'GRAPE',           clue: 'This is dancing in Aaliyah\'s hand' },
  { word: 'SEATTLE',         clue: 'Trip to the underground' },
  { word: 'TOLEDO',          clue: 'A mud hen wedding' },
  { word: 'MRSBUTTERSWORTH', clue: 'Tony\'s favorite teacher' },
  { word: 'UTAH',            clue: 'Furthest drive for a wedding' },
  { word: 'EPIPHONE',        clue: 'Babe\'s favorite guitar' },
  { word: 'SEQUOIA',         clue: 'Surrounded by giants' },
  { word: 'MARCREBILLET',    clue: 'Rocking out in the outfield' },
  { word: 'CRUST',           clue: 'This is found in toes' },
  { word: 'KISS',            clue: 'Final ingredient for Chipmunk\'s French 75' },
  { word: 'CAPTAINTATTOO',   clue: 'Place for spontaneous ink' },
  { word: 'RANDY',           clue: 'Babe\'s favorite South Park character' },
  { word: 'FIONNA',          clue: 'Puppy memorial behind the house' },
  { word: 'DRZEUS',          clue: 'If our puppy wrote rhyming children stories' },
  { word: 'LAKEPERRIS',      clue: 'Only real family camping trip' },
  { word: 'NERFBULLET',      clue: 'This ended up in an eye' },
  { word: 'SOFISTADIUM',     clue: 'So much hype we saw a car fly' },
  { word: 'COLOSSEUM',       clue: 'Surrounded by battling ghosts' },
  { word: 'MUNICH',          clue: 'Ironic place to order a limoncello spritzer' },
  { word: 'RONALDREAGAN',    clue: 'Most American park for a family Fourth of July' },
  { word: 'REDROCKS',        clue: 'A nice family scramble\u2026never lost' },
  { word: 'ENSENADA',        clue: 'What is "neigh" in Spanish?' },
  { word: 'BACKTOBED',       clue: 'Collab album between Hux and Winehouse' },
  { word: 'PORTLAND',        clue: 'Where we saw a secret society' },
];

// ─── Placement engine ────────────────────────────────────────────────────────
function buildPuzzle(entries) {
  let best = null, bestScore = -1;
  // More attempts for larger word sets
  for (let a = 0; a < 120; a++) {
    const sh = [...entries].sort((a, b) => b.word.length - a.word.length + (Math.random() - .5) * 4);
    const r = tryPlace(sh);
    if (r) { const s = score(r); if (s > bestScore) { bestScore = s; best = r; } }
  }
  return best ? finalize(best) : null;
}

function score(r) {
  let x = 0;
  const p = r.placed;
  for (let i = 0; i < p.length; i++) for (let j = i+1; j < p.length; j++) if (crosses(p[i], p[j])) x++;
  return x * 100 + p.length * 10;
}

function crosses(a, b) {
  if (a.dir === b.dir) return false;
  const h = a.dir === 'A' ? a : b, v = a.dir === 'D' ? a : b;
  return v.c >= h.c && v.c < h.c + h.word.length && h.r >= v.r && h.r < v.r + v.word.length;
}

function tryPlace(entries) {
  const S = 45;
  const grid = Array.from({length: S}, () => Array(S).fill(null));
  const placed = [];

  function fits(word, r, c, dir) {
    const len = word.length;
    if (dir === 'A') {
      if (c < 0 || c + len > S || r < 0 || r >= S) return false;
      if (c > 0 && grid[r][c-1]) return false;
      if (c + len < S && grid[r][c+len]) return false;
      for (let i = 0; i < len; i++) {
        const ch = grid[r][c+i];
        if (ch && ch !== word[i]) return false;
        if (!ch && ((r > 0 && grid[r-1][c+i]) || (r < S-1 && grid[r+1][c+i]))) return false;
      }
    } else {
      if (r < 0 || r + len > S || c < 0 || c >= S) return false;
      if (r > 0 && grid[r-1][c]) return false;
      if (r + len < S && grid[r+len][c]) return false;
      for (let i = 0; i < len; i++) {
        const ch = grid[r+i][c];
        if (ch && ch !== word[i]) return false;
        if (!ch && ((c > 0 && grid[r+i][c-1]) || (c < S-1 && grid[r+i][c+1]))) return false;
      }
    }
    return true;
  }

  function place(word, r, c, dir, entry) {
    for (let i = 0; i < word.length; i++) {
      if (dir === 'A') grid[r][c+i] = word[i]; else grid[r+i][c] = word[i];
    }
    placed.push({ ...entry, word, r, c, dir });
  }

  const mid = Math.floor(S / 2), fw = entries[0].word;
  place(fw, mid, mid - Math.floor(fw.length / 2), 'A', entries[0]);

  for (let idx = 1; idx < entries.length; idx++) {
    const entry = entries[idx], word = entry.word;
    let cands = [];
    for (const p of placed) {
      const od = p.dir === 'A' ? 'D' : 'A';
      for (let pi = 0; pi < p.word.length; pi++) {
        for (let wi = 0; wi < word.length; wi++) {
          if (word[wi] !== p.word[pi]) continue;
          let r, c;
          if (od === 'A') { r = p.dir==='A' ? p.r : p.r+pi; c = (p.dir==='A' ? p.c+pi : p.c) - wi; }
          else            { r = (p.dir==='A' ? p.r : p.r+pi) - wi; c = p.dir==='A' ? p.c+pi : p.c; }
          if (r < 0 || c < 0) continue;
          if (fits(word, r, c, od)) {
            let nc = 0;
            for (const q of placed) if (crosses({ word, r, c, dir: od }, q)) nc++;
            cands.push({ r, c, dir: od, entry, nc });
          }
        }
      }
    }
    if (cands.length) {
      cands.sort((a, b) => b.nc - a.nc || (Math.random() - .5));
      const ch = cands[0];
      place(word, ch.r, ch.c, ch.dir, ch.entry);
    }
  }
  if (placed.length < 2) return null;
  return { grid, placed, S };
}

function finalize(r) {
  const { grid, placed, S } = r;
  let minR = S, maxR = 0, minC = S, maxC = 0;
  placed.forEach(p => {
    minR = Math.min(minR, p.r);
    maxR = Math.max(maxR, p.dir === 'D' ? p.r + p.word.length - 1 : p.r);
    minC = Math.min(minC, p.c);
    maxC = Math.max(maxC, p.dir === 'A' ? p.c + p.word.length - 1 : p.c);
  });
  const rows = maxR - minR + 1, cols = maxC - minC + 1;
  const g = Array.from({length: rows}, () => Array(cols).fill(null));
  placed.forEach(p => {
    for (let i = 0; i < p.word.length; i++) {
      if (p.dir === 'A') g[p.r - minR][p.c - minC + i] = p.word[i];
      else               g[p.r - minR + i][p.c - minC] = p.word[i];
    }
    p.r -= minR; p.c -= minC;
  });
  const nums = Array.from({length: rows}, () => Array(cols).fill(0));
  let n = 1;
  for (let row = 0; row < rows; row++) for (let col = 0; col < cols; col++) {
    if (!g[row][col]) continue;
    const aS = (col === 0 || !g[row][col-1]) && col+1 < cols && g[row][col+1];
    const dS = (row === 0 || !g[row-1]?.[col]) && row+1 < rows && g[row+1][col];
    if (aS || dS) nums[row][col] = n++;
  }
  placed.forEach(p => { p.number = nums[p.r][p.c]; });
  return { grid: g, placed, rows, cols, numbering: nums };
}

// ─── Render ──────────────────────────────────────────────────────────────────
const P = buildPuzzle(WORDS);
if (!P) {
  document.body.innerHTML += '<p style="padding:2rem;text-align:center;font-style:italic">Grid generation failed — reload to retry.</p>';
}

let dir = 'A', aR = -1, aC = -1;
const ug = P ? Array.from({length: P.rows}, () => Array(P.cols).fill('')) : [[]];

if (P) {
  const tbl = document.getElementById('grid');
  for (let r = 0; r < P.rows; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < P.cols; c++) {
      const tdEl = document.createElement('td');
      tdEl.id = 'td' + r + '_' + c;
      if (!P.grid[r][c]) { tdEl.className = 'blk'; tr.appendChild(tdEl); continue; }
      const n = P.numbering[r][c];
      if (n) { const sp = document.createElement('span'); sp.className = 'n'; sp.textContent = n; tdEl.appendChild(sp); }
      const inp = document.createElement('input');
      inp.type = 'text'; inp.maxLength = 1;
      inp.setAttribute('autocomplete', 'off');
      inp.setAttribute('autocorrect', 'off');
      inp.setAttribute('autocapitalize', 'characters');
      inp.setAttribute('spellcheck', 'false');
      inp.dataset.r = r; inp.dataset.c = c;
      inp.addEventListener('click',   () => cellClick(r, c));
      inp.addEventListener('keydown', e  => cellKey(e, r, c));
      inp.addEventListener('input',   e  => cellInput(e, r, c));
      tdEl.appendChild(inp);
      tr.appendChild(tdEl);
    }
    tbl.appendChild(tr);
  }

  ['A','D'].forEach(d => {
    const ul = document.getElementById('cl' + d);
    P.placed.filter(p => p.dir === d).sort((a, b) => a.number - b.number).forEach(p => {
      const li = document.createElement('li');
      li.id = 'li' + d + p.number;
      li.innerHTML = '<span class="cn">' + p.number + '</span>' + p.clue;
      li.addEventListener('click', () => clueClick(d, p.number));
      ul.appendChild(li);
    });
  });

  document.getElementById('dateline').textContent =
    'Generated ' + new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

// ─── Interaction ─────────────────────────────────────────────────────────────
function setDir(d) {
  dir = d;
  document.getElementById('bA').classList.toggle('on', d === 'A');
  document.getElementById('bD').classList.toggle('on', d === 'D');
  if (aR >= 0) { highlight(aR, aC); updateBar(aR, aC); }
}

function cellClick(r, c) {
  if (aR === r && aC === c) { setDir(dir === 'A' ? 'D' : 'A'); return; }
  aR = r; aC = c;
  if (!wordAt(r, c, dir)) { const od = dir === 'A' ? 'D' : 'A'; if (wordAt(r, c, od)) setDir(od); }
  highlight(r, c); updateBar(r, c);
}

function clueClick(d, num) {
  setDir(d);
  const p = P.placed.find(x => x.dir === d && x.number === num);
  if (!p) return;
  aR = p.r; aC = p.c;
  highlight(p.r, p.c); updateBar(p.r, p.c);
  const el = document.querySelector('input[data-r="' + p.r + '"][data-c="' + p.c + '"]');
  if (el) el.focus();
}

function cellInput(e, r, c) {
  const v = e.target.value.replace(/[^A-Za-z]/g, '').toUpperCase().slice(-1);
  e.target.value = v; ug[r][c] = v;
  td(r, c).classList.remove('ok', 'bad');
  if (v) { if (dir === 'A') step(r, c, 0, 1); else step(r, c, 1, 0); }
}

function cellKey(e, r, c) {
  if (e.key === 'Backspace') {
    if (!ug[r][c]) {
      if (dir === 'A') step(r, c, 0, -1); else step(r, c, -1, 0);
      e.preventDefault();
    } else {
      ug[r][c] = '';
      const el = document.querySelector('input[data-r="'+r+'"][data-c="'+c+'"]');
      if (el) el.value = '';
    }
    return;
  }
  const m = { ArrowRight:[0,1], ArrowLeft:[0,-1], ArrowDown:[1,0], ArrowUp:[-1,0] };
  if (m[e.key]) { step(r, c, ...m[e.key]); e.preventDefault(); }
}

function step(r, c, dr, dc) {
  const nr = r+dr, nc = c+dc;
  if (nr >= 0 && nr < P.rows && nc >= 0 && nc < P.cols && P.grid[nr][nc]) {
    aR = nr; aC = nc;
    const el = document.querySelector('input[data-r="'+nr+'"][data-c="'+nc+'"]');
    if (el) { el.focus(); highlight(nr, nc); updateBar(nr, nc); }
  }
}

function highlight(r, c) {
  document.querySelectorAll('td.hl, td.hl-cur').forEach(t => t.classList.remove('hl', 'hl-cur'));
  document.querySelectorAll('ul.cl li.active').forEach(l => l.classList.remove('active'));
  const p = wordAt(r, c, dir); if (!p) return;
  for (let i = 0; i < p.word.length; i++) {
    const tr2 = p.dir==='A' ? p.r : p.r+i, tc = p.dir==='A' ? p.c+i : p.c;
    td(tr2, tc).classList.add('hl');
  }
  td(r, c).classList.remove('hl'); td(r, c).classList.add('hl-cur');
  const li = document.getElementById('li' + p.dir + p.number);
  if (li) { li.classList.add('active'); li.scrollIntoView({ block: 'nearest' }); }
}

function updateBar(r, c) {
  const p = wordAt(r, c, dir);
  document.getElementById('cluebar').textContent =
    p ? p.number + ' ' + (p.dir==='A' ? 'Across' : 'Down') + ': ' + p.clue : '\u00a0';
}

function wordAt(r, c, d) {
  return P.placed.find(p => p.dir === d && (
    d === 'A' ? p.r === r && c >= p.c && c < p.c + p.word.length
              : p.c === c && r >= p.r && r < p.r + p.word.length
  )) || null;
}

function td(r, c) { return document.getElementById('td' + r + '_' + c); }

function doCheck() {
  let right = 0, wrong = 0, empty = 0, total = 0;
  for (let r = 0; r < P.rows; r++) for (let c = 0; c < P.cols; c++) {
    if (!P.grid[r][c]) continue; total++;
    const t = td(r, c); t.classList.remove('ok','bad');
    const v = ug[r][c];
    if (!v) { empty++; continue; }
    if (v === P.grid[r][c]) { t.classList.add('ok'); right++; } else { t.classList.add('bad'); wrong++; }
  }
  const el = document.getElementById('result'); el.style.display = 'block';
  if (!wrong && !empty) { el.className = 'result ok'; el.textContent = 'Puzzle complete! Nice work.'; }
  else { el.className = 'result bad'; el.textContent = right + '/' + total + ' correct — ' + wrong + ' wrong, ' + empty + ' empty.'; }
}

function doClear() {
  for (let r = 0; r < P.rows; r++) for (let c = 0; c < P.cols; c++) {
    ug[r][c] = '';
    const el = document.querySelector('input[data-r="'+r+'"][data-c="'+c+'"]');
    if (el) el.value = '';
    const t = td(r, c); if (t) t.classList.remove('ok','bad');
  }
  document.getElementById('result').style.display = 'none';
}

function doReveal() {
  for (let r = 0; r < P.rows; r++) for (let c = 0; c < P.cols; c++) {
    if (!P.grid[r][c]) continue;
    ug[r][c] = P.grid[r][c];
    const el = document.querySelector('input[data-r="'+r+'"][data-c="'+c+'"]');
    if (el) el.value = P.grid[r][c];
  }
}
</script>
</body>
</html>
